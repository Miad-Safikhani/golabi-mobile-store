    <style>
      @font-face{
        font-family: "vazirmatn";
        src: url(./assets/fonts/vazirmatn/Vazirmatn-Regular.woff2)
          format("woff2");

      }
      @font-face {
            font-family: "bold";
            src: url(./assets/font/Vazirmatn-Bold.woff2) format("woff2");
        }
        @font-face {
            font-family: "semi-bold";
            src: url(./assets/font/Vazirmatn-SemiBold.woff2) format("woff2");
        }
        .margin {
            padding: 20px;
            border-radius: 18px;
        }
        #root {
            padding: 60px;
        }
        .addtocardbtn {
            background-color: #C5B3D3;
        }
        .body {
            font-family: "vazirmatn";
        }
        .navbar-brand {
            font-family: "bold";
            font-size: x-large;
        }
        .bold-nav {
            font-family: "bold";
        }
        .semi-bold {
            font-family: "semi-bold";
            font-size: small;
        }
        .title-font {
            font-family: "semi-bold";
            font-size: small;
        }
        .title-price {
            direction: ltr;
            font-family: "bold";
        }
        .biog {
            padding: 20px;
            border-radius: 18px;
            width: 80%;
            margin: 5% 10% 5% 5%;
            max-width: 100%;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .biog-font {
            font-family: "bold";
            font-size: medium;
        }
        .h1 {
            margin-top: 3%;
            margin-right: 3%;
            text-align: center;
        }
        .product-card {
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .icon-text {
            display: inline-block;
            padding-left: 35px;
            background-image: url('./assets/svg/economy-svgrepo-com.svg');
            background-size: 30px 30px;
            background-repeat: no-repeat;
             background-position: left;
            text-align: center;
        }
    </style>
  </head>
  <body style="background-color: #FBEFEF;direction: rtl;" class="body">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav" id="navbarNav">
            <li class="nav-item bold-nav">
              <a class="nav-link active" aria-current="page" href="./index.html">خانه</a>
            </li>
            <li class="nav-item bold-nav">
              <a class="nav-link" href="./porfroosh-products.html">محصولات پرفروش</a>
            </li>
            <li class="nav-item bold-nav">
              <a class="nav-link" href="./economic-products.html">محصولات اقتصادی</a>
            </li>
            <li class="nav-item dropdown bold-nav">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                دسته بندی
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="./apple-products.html">محصولات اپل</a></li>
                <li><a class="dropdown-item" href="./samsung-produts.html">محصولات سامسونگ</a></li>
                <li><a class="dropdown-item" href="./shiaomi-products.html">محصولات شیائومی</a></li>
                <li><a class="dropdown-item" href="./honor-products.html">محصولات آنر</a></li>

    <div>
      <apam class="h1 bold-nav icon-text">محصولات اقتصادی گلابی موبایل</spam>
    </div>
    <div id="root"></div>
  </body>
  <script>
    const products = [
    {
    id: 6,
    title: "گوشی موبایل شیائومی مدل Redmi A3 دو سیم کارت ظرفیت 128 گیگابایت و رم 4 گیگابایت",
    price: 11400000,
    image: "06-shia.webp",
    },
    {
    id: 7,
    title: "گوشی موبایل سامسونگ مدل Galaxy A06 دو سیم کارت ظرفیت 64 گیگابایت و رم 4 گیگابایت",
    price: 12800000,
    image: "07-sam.webp",
    },  
    {
    id: 4,
    title: "گوشی موبایل سامسونگ مدل Galaxy A07 دو سیم کارت ظرفیت 64 گیگابایت و رم 4 گیگابایت",
    price: 14200000,
    image: "04-sam.webp",
    },
    {
    id: 1,
    title: "گوشی موبایل شیائومی مدل Poco X4 Pro 5G 2201116PG دو سیم کارت ظرفیت 256 گیگابایت و رم 8 گیگابایت",
    price: 15600000,
    image: "01-shia.webp",
    },
    {
    id: 5,
    title: "گوشی موبایل شیائومی مدل Poco C71 دو سیم کارت ظرفیت 128 گیگابایت و رم 4 گیگابایت",
    price: 23900000,
    image: "05-shia.webp",
    },
    {
    id: 5,
    title: "گوشی موبایل سامسونگ مدل Galaxy A16 4G دو سیم کارت ظرفیت 128 گیگابایت و رم 4 گیگابایت - ویتنام",
    price: 21700000,
    image: "05-sam.webp",
    },

    ];

    //card array

    let cart = [];

    //sbd function updating
    function updateCartBadge() {
        const cartBadge = document.querySelector('.cart-badge');
        if (cartBadge) {
            cartBadge.textContent = cart.length;
        }
    }

    //sbd in navbar
    document.addEventListener('DOMContentLoaded', function() {
        const navBar = document.querySelector('.navbar-nav');
        if (navBar) {
            const cartLi = document.createElement('li');
            cartLi.className = 'nav-item bold-nav position-relative';
            cartLi.innerHTML = `
                <a class="nav-link" href="#">
                    🛒 سبد خرید
                    <span class="badge bg-danger cart-badge" style="position: absolute; top: 0; right: 0;">
                        0
                    </span>
                </a>
            `;
            navBar.appendChild(cartLi);
        }
    });

    //root
    const root = document.getElementById("root");
    root.className = "container";

    const row = document.createElement("div");
    row.className = "row g-4";
    root.appendChild(row);

    for (let i = 0; i < products.length; i++) {
      const col = document.createElement("div");
      col.className = "col-md-4";
      row.appendChild(col);

      //cart
      const card = document.createElement("div");
      card.className = "card border h-100 margin product-card";
      col.appendChild(card);

      //cart img
      const img = document.createElement("img");
      img.src = `./assets/img/${products[i].image}`;
      img.className = "card-img-top";
      card.appendChild(img);

      //cart body
      const cardBody = document.createElement("div");
      cardBody.className = "card-body d-flex flex-column";
      card.appendChild(cardBody);

      //card title
      const h5 = document.createElement("h5");
      h5.className = "card-title title-font";
      h5.innerHTML = products[i].title;
      cardBody.appendChild(h5);

      //cart price
      const h3 = document.createElement("h3");
      h3.className = "card-text title-price";
      const priceWithComma = products[i].price.toLocaleString('fa-IR');
      h3.innerHTML = `${priceWithComma} تومان`;
      cardBody.appendChild(h3);

      //add to card btn
      const addToCartBtn = document.createElement("button");
      addToCartBtn.className = "btn addtocardbtn semi-bold mt-auto";
      addToCartBtn.innerHTML = "افزودن به سبد خرید";
      
      //addtocardbtn function
      addToCartBtn.addEventListener("click", function() {
          cart.push(products[i].id);
          console.log('🛒 سبد خرید:', cart);
          alert(`✅ ${products[i].title.substring(0, 30)}... به سبد خرید اضافه شد!`);
          // 
          updateCartBadge();
      });

      cardBody.appendChild(addToCartBtn);
    }
  </script>
  <script src="./assets/js/bootstrap.bundle.min.js"></script>
</html>
